name: Run Unit Tests

on:
  push:
    branches:
      - main   # trigger when code pushed to main
  pull_request:
    branches:
      - main   # also run on PR

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test